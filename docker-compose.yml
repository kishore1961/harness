version: "3.8"

services:

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_fastapi
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mlflow
    networks:
      - rag_network

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_streamlit
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - API_URL=http://fastapi:8000
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - fastapi
    networks:
      - rag_network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: rag_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow
    networks:
      - rag_network

networks:
  rag_network:
    driver: bridge
